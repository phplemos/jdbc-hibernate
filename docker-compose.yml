version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: lp3-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: lp3_comercial
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql
    restart: unless-stopped
